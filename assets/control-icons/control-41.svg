<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="蓝色隧道">
  <defs>
    <linearGradient id="bg" x1="32" y1="20" x2="220" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b2028"/>
      <stop offset="0.42" stop-color="rgb(52,82,113)"/>
      <stop offset="1" stop-color="#06080c"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="28%" r="78%">
      <stop offset="0" stop-color="rgb(150,203,255)" stop-opacity=".95"/>
      <stop offset=".42" stop-color="#75baff" stop-opacity=".46"/>
      <stop offset="1" stop-color="#75baff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="beam" cx="28%" cy="72%" r="86%">
